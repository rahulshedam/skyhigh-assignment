server:
  port: 8084

spring:
  application:
    name: payment-service
  
  datasource:
    url: jdbc:h2:file:./data/payment-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2

# Payment Simulation Configuration
payment:
  simulation:
    processing-delay-ms: 500   # Simulate payment gateway latency
    success-rate: 0.70         # Probability of success (70% success, 30% failure). Use simulateFailure=true in request to force failure for tests.

# OpenAPI/Swagger Configuration
springdoc:
  swagger-ui:
    enabled: true

# RabbitMQ Exchange and Queue Configuration
rabbitmq:
  exchange:
    payment: payment.exchange
  queues:
    payment-processed: payment.processed.queue
  routing-keys:
    payment-success: payment.success
    payment-failure: payment.failure

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.skyhigh.payment: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
