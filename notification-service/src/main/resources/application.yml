server:
  port: 8085

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:h2:mem:notification-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2
  
  # Thymeleaf Configuration for Email Templates
  thymeleaf:
    cache: false
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

# Mock Email Configuration
email:
  mock:
    enabled: true
    log-to-console: true
  from: noreply@skyhigh-airlines.com

# OpenAPI/Swagger Configuration
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    path: /api-docs

# RabbitMQ Exchange and Queue Configuration
rabbitmq:
  exchange:
    notification: notification.exchange
  queues:
    notification: notification.queue
  routing-keys:
    notification: notification.#

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.skyhigh.notification: DEBUG
    org.springframework.amqp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
