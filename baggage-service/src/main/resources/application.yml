server:
  port: 8083

spring:
  application:
    name: baggage-service

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:./data/baggage-service/baggage-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# RabbitMQ Custom Configuration
rabbitmq:
  exchange:
    baggage: baggage.exchange
  routing-keys:
    baggage-validated: baggage.validated
    excess-fee: baggage.excess-fee

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.skyhigh.baggage: DEBUG
    org.springframework.amqp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# OpenAPI/Swagger Configuration
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
